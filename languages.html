<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <meta name="theme-color" content="#c0c0c0" id="meta-theme" />
  <title>Languages · Subham Ghosh</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    (function() {
      if (!window.chatbase || window.chatbase('getState') !== 'initialized') {
        window.chatbase = (...args) => {
          if (!window.chatbase.q) { window.chatbase.q = []; }
          window.chatbase.q.push(args);
        };
        window.chatbase = new Proxy(window.chatbase, {
          get(target, prop) {
            if (prop === 'q') { return target.q; }
            return (...args) => target(prop, ...args);
          }
        });
      }
      const onLoad = function() {
        const script = document.createElement('script');
        script.src = 'https://www.chatbase.co/embed.min.js';
        script.id = 'cUB9NcnmSHV6AqjO7Mei7';
        script.domain = 'www.chatbase.co';
        document.body.appendChild(script);
      };
      if (document.readyState === 'complete') {
        onLoad();
      } else {
        window.addEventListener('load', onLoad);
      }
    })();
  </script>
</head>
<body data-page="languages">
  <div id="site-shell"></div>

  <script src="js/portfolio-data.js"></script>
  <script src="js/blogs-data.js"></script>

  <script src="js/main.js"></script>
</body>
</html>
